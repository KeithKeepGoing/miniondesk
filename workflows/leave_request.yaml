name: 請假申請
description: 員工請假工作流程
minion: kevin

fields:
  - name: employee
    label: 員工姓名
    required: true
  - name: leave_type
    label: 假別
    options: [年假, 病假, 事假, 特休, 婚假, 喪假]
    required: true
  - name: start_date
    label: 開始日期
    type: date
    required: true
  - name: days
    label: 天數
    type: number
    required: true
  - name: delegate
    label: 職務代理人
    required: true
  - name: reason
    label: 請假原因

steps:
  - name: 提交申請
    type: notify
    message: "{employee} 提交了 {leave_type} 申請，{start_date} 起共 {days} 天，代理人：{delegate}"

  - name: 主管審批
    type: approval
    approver: manager
    timeout_hours: 24
    message: "請審批 {employee} 的 {leave_type} 申請"

  - name: HR 確認
    type: approval
    approver: kevin
    message: "HR 確認假單並更新系統"

  - name: 通知員工
    type: notify
    message: "您的 {leave_type} 申請已核准，{start_date} 起休 {days} 天"
