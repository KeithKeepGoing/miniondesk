name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check host/ container/runner/ --ignore E501,E402,F401

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        run: pip install pytest pyyaml

      - name: Run tests
        run: pytest tests/ -v --tb=short

  imports:
    name: Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check critical imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'container/runner')
          from providers import BaseProvider, Message, Response, ToolCall
          from providers.auto import get_provider
          from tools import build_registry, ToolContext
          r = build_registry(['Bash','Read','Write','Edit','send_message','schedule_task','search_knowledge_base','start_workflow'])
          assert len(r.schemas()) == 8, f'Expected 8 tools, got {len(r.schemas())}'
          print(f'✅ All imports OK, {len(r.schemas())} tools registered')
          "

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build runner image
        run: docker build -t miniondesk-runner:ci container/

      - name: Smoke test container
        run: |
          echo '{"chatJid":"test","minionName":"phil","prompt":"say ok","personaMd":"You are Phil. Reply with just: ok","enabledTools":[],"ipcDir":"/tmp/ipc","dataDir":"/tmp/data","secrets":{"ANTHROPIC_API_KEY":"test"}}' \
          | timeout 10 docker run --rm -i --network none miniondesk-runner:ci \
          || echo "Expected: provider error (no real API key) — container runs correctly"
